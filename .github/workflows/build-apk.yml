name: Build APK

on:
  push:
    paths-ignore:
      - 'README.md'

    branches:
      - master
      - actions

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Build app
        run: sudo ./gradlew build

      - name: Upload debug apk
        uses: actions/upload-artifact@v1
        with:
          name: gbcc.apk
          path: app/build/outputs/apk/debug/app-debug.apk
